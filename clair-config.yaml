# Clair configuration for scanning Docker images
# Used with clairctl for local vulnerability analysis

clair:
  database:
    type: pgsql
    options:
      source: host=localhost port=5432 user=clair dbname=clair sslmode=disable

  api:
    addr: "0.0.0.0:6060"
    healthaddr: "0.0.0.0:6061"
    timeout: 900s
    paginationkey: ""

  updater:
    interval: 2h

  notifier:
    attempts: 3
    renotifyinterval: 2h
